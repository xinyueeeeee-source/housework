<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>家务积分🧹</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
html { font-size: 18px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif;
  background: #f2f3f7;
  margin: 0;
  padding: 16px;
  overflow-x: hidden;
}
.container { max-width: 500px; margin: 0 auto; }

h2 { text-align: center; font-size: 28px; margin-bottom: 14px; }
h3 { font-size: 22px; margin-bottom: 8px; }

.card {
  background: white;
  padding: 20px;
  border-radius: 24px;
  margin-bottom: 16px;
  box-shadow: 0 6px 22px rgba(0,0,0,0.08);
  line-height: 1.8;
  word-wrap: break-word;
}

.status { text-align: center; font-size: 16px; margin-top: 8px; opacity: 0.8; }

#dateText, #currentUserText { font-size: 18px; line-height: 1.8; text-align: center; display: block; }

.score-board { text-align: center; font-size: 20px; font-weight: bold; white-space: nowrap; transition: all 0.3s ease; }

@keyframes scoreJump { 0% { transform: scale(1); } 30% { transform: scale(1.15); } 60% { transform: scale(1.08); } 100% { transform: scale(1); } }

.task-grid { display: flex; flex-direction: column; gap: 12px; }
.task-category { margin-bottom: 12px; }
.category-title { font-weight: bold; margin-bottom: 6px; font-size: 18px; }
.task-row { display: flex; justify-content: flex-start; align-items: center; flex-wrap: nowrap; gap: 6px; overflow-x: auto; }
.task-button {
  font-size: 14px;
  padding: 10px;
  background: linear-gradient(135deg, #c2e0ff, #e0f0ff);
  color: #004080;
  box-shadow: 0 3px 12px rgba(0,0,0,0.1);
  border: none; border-radius: 14px;
  cursor: pointer;
  flex-shrink: 0;
  min-width: 90px;
  transition: all 0.15s ease;
}
.task-button:hover { transform: scale(1.03); }
.task-button:active { transform: scale(0.95); transition: transform 0.1s; }

button { border: none; border-radius: 16px; padding: 8px 12px; margin: 2px; font-size: 14px; cursor: pointer; transition: all 0.15s ease; }
button:hover { transform: scale(1.05); }

.primary { background: #ffcce0; color: #800040; }

input, select { padding: 8px; font-size: 14px; width: 100%; margin: 6px 0; display: block; border-radius: 12px; border: 2px solid #ccc; box-sizing: border-box; }

.record-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 16px;
  background: #f9f9f9;
  border-radius: 12px;
  padding: 8px 12px;
  align-items: center;
}
.record-item:nth-child(even) { background: #f0f0f0; }

.user-select-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.user-btn-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

@media (max-width: 480px) {
  html { font-size: 14px; }
  h2 { font-size: 24px; }
  h3 { font-size: 20px; }
  #dateText, #currentUserText { font-size: 15px; line-height: 1.8; }
  .score-board { font-size: 16px; }
  .task-button { font-size: 12px; padding: 8px; min-width: 70px; }
  button { font-size: 12px; padding: 6px 8px; }
  input, select { font-size: 12px; padding: 6px; }
  .record-item { font-size: 14px; padding: 6px 10px; }
}
</style>
</head>
<body>
<div class="container">
<h2>家务积分🧹</h2>

<div class="card" style="text-align:center;">
📅 <span id="dateText"></span><br>
👤 当前用户：<b id="currentUserText">未选择</b>

<div class="user-select-container">
  <div class="user-btn-container">
    <span style="font-size:28px;">👦🏻</span>
    <button onclick="setUser('程大途')">程大途</button>
  </div>
  <div class="user-btn-container">
    <span style="font-size:28px;">👧🏻</span>
    <button onclick="setUser('辛月')">辛月</button>
  </div>
</div>

<div class="status" id="syncStatus">🟡 初始化中...</div>
</div>

<div class="card">
  <div class="score-board" id="scoreBoard">-- : --</div>
</div>

<div class="card">
  <h3>家务任务</h3>
  <div id="tasks" class="task-grid"></div>
</div>

<div class="card">
  <h3>添加任务</h3>
  <input id="newTask" placeholder="新任务">
  <input id="newScore" type="number" placeholder="分数">
  <select id="newCategory">
    <option value="Küche">Küche</option>
    <option value="waschen">waschen</option>
    <option value="saubermachen">saubermachen</option>
    <option value="Robrock">Robrock</option>
    <option value="Pflanzen">Pflanzen</option>
    <option value="其他">其他</option>
  </select>
  <button class="primary" onclick="addTask()">添加任务</button>
</div>

<div class="card">
  <h3>📜 记录</h3>
  <div id="records"></div>
  <button id="showMoreBtn" onclick="showMoreRecords()">展开更多</button>
</div>
</div>

<script>
const tasksDiv = document.getElementById("tasks");
const recordsDiv = document.getElementById("records");
const showMoreBtn = document.getElementById("showMoreBtn");
const syncStatus = document.getElementById("syncStatus");
const scoreBoard = document.getElementById("scoreBoard");

let displayCount = 5;
let currentUser = "";
let now = new Date();
let currentMonth = now.toISOString().slice(0,7);

// 读取本地存储，如果没有则初始化默认六类
let storedTasks = localStorage.getItem("tasks");
let tasks = storedTasks ? JSON.parse(storedTasks) : {"Küche":[],"waschen":[],"saubermachen":[],"Robrock":[],"Pflanzen":[],"其他":[]};
let records = JSON.parse(localStorage.getItem("records")||'[]');
let rewardGiven = JSON.parse(localStorage.getItem("reward")||'{}');
let lastSettlement = localStorage.getItem("lastSettlement")||"";

function formatDate(){ 
  const d=new Date(); 
  const days=["日","一","二","三","四","五","六"]; 
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} 星期${days[d.getDay()]}`; 
}

function setStatus(text){ syncStatus.innerText=text; }

function saveAll(){ 
  localStorage.setItem("tasks",JSON.stringify(tasks)); 
  localStorage.setItem("records",JSON.stringify(records)); 
  localStorage.setItem("reward",JSON.stringify(rewardGiven)); 
  localStorage.setItem("lastSettlement",lastSettlement); 
}

function setUser(name){ 
  currentUser=name; 
  document.getElementById("currentUserText").innerText=name; 
  document.querySelectorAll(".user-btn-container button").forEach(b=>{
    b.classList.remove("active"); 
    if(b.innerText===name) b.classList.add("active");
  }); 
}

function addTask(){
  let t=document.getElementById("newTask").value.trim();
  let s=parseInt(document.getElementById("newScore").value);
  let cat=document.getElementById("newCategory").value;
  if(!tasks[cat]) tasks[cat]=[];
  if(!t||!s) return alert("请输入任务和分数");
  tasks[cat].push([t,s]);
  saveAll();
  renderTasks();
}

function renderTasks(){
  tasksDiv.innerHTML="";
  for(let cat of ["Küche","waschen","saubermachen","Robrock","Pflanzen","其他"]){
    if(!tasks[cat]) continue;
    let catDiv=document.createElement("div"); 
    catDiv.className="task-category";
    let title=document.createElement("div"); 
    title.className="category-title"; 
    title.innerText=cat; 
    catDiv.appendChild(title);

    let displayTasks = tasks[cat].slice(0,5);
    displayTasks.forEach((t,index)=>{
      let row=document.createElement("div"); 
      row.className="task-row";
      let btn=document.createElement("button"); 
      btn.className="task-button"; 
      btn.innerText=t[0]+" +"+t[1];
      btn.onclick=()=>{ addRecord(t[0],t[1]); };
      let editBtn=document.createElement("button"); 
      editBtn.innerText="✏️"; 
      editBtn.style.fontSize="12px"; 
      editBtn.style.padding="3px 5px";
      editBtn.onclick=()=>{ 
        let newScore=prompt(`修改【${t[0]}】分数:`,t[1]); 
        if(newScore!==null){ 
          let s=parseInt(newScore); 
          if(!isNaN(s)){tasks[cat][index][1]=s; saveAll(); renderTasks(); updateAll();}
        } 
      };
      row.appendChild(btn); 
      row.appendChild(editBtn);
      catDiv.appendChild(row);
    });

    tasksDiv.appendChild(catDiv);
  }
}

function addRecord(task,score){
  if(!currentUser) return alert("请先选人");
  records.push({name:currentUser, task, score, time:new Date().toISOString(), month:currentMonth});
  saveAll();
  updateAll();
  scoreBoard.style.animation="scoreJump 0.5s"; 
  setTimeout(()=>{scoreBoard.style.animation="";},500);
}

function calcScores(month){ 
  let scores={}; 
  records.forEach(r=>{ if(r.month!==month)return; scores[r.name]=(scores[r.name]||0)+r.score; }); 
  return scores; 
}

function renderRecords(){
  recordsDiv.innerHTML="";
  let visibleRecords=records.slice(-displayCount).reverse();
  visibleRecords.forEach((r,i)=>{
    const div=document.createElement("div"); 
    div.className="record-item"; 
    div.innerHTML=`<span>${r.name} ${r.task} +${r.score}</span>`;
    const delBtn = document.createElement("button");
    delBtn.innerText="🗑️";
    delBtn.style.fontSize="12px";
    delBtn.style.padding="2px 6px";
    delBtn.onclick=()=>{
      if(confirm("确认删除该记录吗？")){
        let index = records.findIndex(rec=>rec===r);
        if(index>-1) { records.splice(index,1); saveAll(); updateAll(); }
      }
    };
    div.appendChild(delBtn);
    recordsDiv.appendChild(div);
  }); 
  showMoreBtn.style.display=records.length>displayCount?"block":"none"; 
}

function showMoreRecords(){ displayCount+=10; renderRecords(); }

function renderScoreBoard(){ 
  let scores=calcScores(currentMonth); 
  const aScore=scores["程大途"]||0; 
  const bScore=scores["辛月"]||0; 
  let aCrown=aScore>bScore?" 👑":""; 
  let bCrown=bScore>aScore?" 👑":""; 
  scoreBoard.innerText=`程大途${aCrown} ${aScore}分  vs  辛月${bCrown} ${bScore}分`; 
}

function updateAll(){ renderRecords(); renderScoreBoard(); }

// 页面加载完成
document.getElementById("dateText").innerText=formatDate();
renderTasks(); 
updateAll();
setStatus("✅ 初始化完成");
</script>
</body>
</html>
