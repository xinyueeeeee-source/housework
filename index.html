<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>家务积分🧹</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
html { font-size: 18px; } /* 电脑端默认字体 */
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif;
  background: #f2f3f7;
  margin: 0;
  padding: 16px;
  overflow-x: hidden;
}
.container { max-width: 500px; margin: 0 auto; }

h2 { text-align: center; font-size: 28px; margin-bottom: 14px; }
h3 { font-size: 22px; margin-bottom: 8px; }

.card {
  background: white;
  padding: 22px;
  border-radius: 24px;
  margin-bottom: 16px;
  box-shadow: 0 6px 22px rgba(0,0,0,0.08);
  line-height: 1.9;
  word-wrap: break-word;
}

.status { text-align: center; font-size: 16px; margin-top: 8px; opacity: 0.8; }

#dateText, #currentUserText { font-size: 20px; line-height: 2; }

.score-board { text-align: center; font-size: 22px; font-weight: bold; transition: all 0.3s ease; }

@keyframes scoreJump { 0% { transform: scale(1); } 30% { transform: scale(1.15); } 60% { transform: scale(1.08); } 100% { transform: scale(1); } }

.task-grid { display: flex; flex-direction: column; gap: 10px; }
.task-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
.task-button {
  font-size: 16px;
  padding: 12px;
  background: linear-gradient(135deg, #c2e0ff, #e0f0ff);
  color: #004080;
  box-shadow: 0 3px 12px rgba(0,0,0,0.1);
  border: none;
  border-radius: 16px;
  cursor: pointer;
  flex: 1 1 auto;
  min-width: 100px;
  margin-bottom: 4px;
  transition: all 0.15s ease;
}
.task-button:hover { transform: scale(1.03); }
.task-button:active { transform: scale(0.95); transition: transform 0.1s; }

button { border: none; border-radius: 16px; padding: 10px 14px; margin: 4px 3px; font-size: 16px; cursor: pointer; transition: all 0.15s ease; }
button:hover { transform: scale(1.05); }

.primary { background: #ffcce0; color: #800040; }

input { padding: 10px; font-size: 16px; width: 100%; margin: 8px 0; display: block; border-radius: 12px; border: 2px solid #ccc; box-sizing: border-box; }

.record-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 18px;
  background: #f9f9f9;
  border-radius: 12px;
  padding: 10px 14px;
  align-items: center;
  transition: background 0.2s;
}
.record-item:nth-child(even) { background: #f0f0f0; }
.record-item button {
  background: #ff6b6b; color: white; padding: 6px 10px; border-radius: 12px; font-size: 14px;
}

ul { padding-left: 16px; font-size: 18px; }

/* ====== 手机端自适应 ====== */
@media (max-width: 480px) {
  html { font-size: 14px; } /* 手机整体缩小 */
  h2 { font-size: 24px; }
  h3 { font-size: 20px; }
  #dateText, #currentUserText { font-size: 16px; line-height: 2; }
  .score-board { font-size: 18px; }
  .task-button { font-size: 14px; padding: 10px; }
  button { font-size: 14px; padding: 8px 10px; }
  input { font-size: 14px; padding: 8px; }
  .record-item { font-size: 16px; padding: 8px 12px; }
  .record-item button { font-size: 12px; padding: 4px 8px; }
}
</style>
</head>
<body>
<div class="container">
<h2>家务积分🧹</h2>

<!-- 顶部信息 + 用户选择 -->
<div class="card">
📅 <span id="dateText"></span><br>
👤 当前用户：<b id="currentUserText">未选择</b><br>
<button onclick="setUser('程大途')">程大途</button>
<button onclick="setUser('辛月')">辛月</button>
<div class="status" id="syncStatus">🟡 初始化中...</div>
</div>

<!-- 分数板 -->
<div class="card">
  <div class="score-board" id="scoreBoard">-- : --</div>
</div>

<!-- 家务任务 -->
<div class="card">
  <div id="tasks" class="task-grid"></div>
</div>

<!-- 新增任务 -->
<div class="card">
  <input id="newTask" placeholder="新任务">
  <input id="newScore" type="number" placeholder="分数">
  <button class="primary" onclick="addTask()">添加任务</button>
</div>

<!-- 记录 -->
<div class="card">
  <h3>📜 记录</h3>
  <div id="records"></div>
  <button id="showMoreBtn" onclick="showMoreRecords()">展开更多</button>
</div>
</div>

<script>
// ===== 云配置 =====
const BIN_ID = "69ba0b55c3097a1dd535429c";
const API_KEY = "$2a$10$6pBPrU9SDFjVuN0RpIVh5..BJJOobImUPggq1ftD62HC10eoPjK0a";
const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// DOM
const tasksDiv = document.getElementById("tasks");
const recordsDiv = document.getElementById("records");
const showMoreBtn = document.getElementById("showMoreBtn");
const syncStatus = document.getElementById("syncStatus");
const scoreBoard = document.getElementById("scoreBoard");

let displayCount = 5; // 默认显示最近5条记录

function formatDate(){
  const d = new Date();
  const days = ["日","一","二","三","四","五","六"];
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} 星期${days[d.getDay()]}`;
}
function setStatus(text){ syncStatus.innerText = text; }

// 数据
let currentUser = "";
let now = new Date();
let currentMonth = now.toISOString().slice(0,7);
let tasks = JSON.parse(localStorage.getItem("tasks")||`[
["倒垃圾",1],["洗碗",1],["做饭",3],["拖地",2]
]`);
let records = JSON.parse(localStorage.getItem("records")||`[]`);
let rewardGiven = JSON.parse(localStorage.getItem("reward")||`{}`);
let lastSettlement = localStorage.getItem("lastSettlement") || "";

// 云同步
let lastSyncTime = 0;
async function syncToCloud(){
  let nowTime = Date.now();
  if(nowTime - lastSyncTime < 1000) return;
  lastSyncTime = nowTime;
  setStatus("🟡 同步中...");
  try{
    await fetch(BASE_URL, {method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({tasks, records})});
    setStatus("🟢 已同步");
  }catch(e){ console.log(e); setStatus("🔴 同步失败"); }
}
async function loadFromCloud(){
  setStatus("🟡 加载云数据...");
  try{
    let res = await fetch(BASE_URL,{headers: {"X-Master-Key":API_KEY}});
    let data = await res.json();
    if(data.record){ tasks = data.record.tasks || tasks; records = data.record.records || records; }
    setStatus("🟢 云数据已加载");
    renderTasks(); updateAll();
  }catch(e){ console.log(e); setStatus("🔴 云加载失败（使用本地数据）"); }
}

// 保存
function saveAll(){ localStorage.setItem("tasks", JSON.stringify(tasks)); localStorage.setItem("records", JSON.stringify(records)); localStorage.setItem("reward", JSON.stringify(rewardGiven)); localStorage.setItem("lastSettlement", lastSettlement); syncToCloud(); }

// 用户
function setUser(name){
  currentUser = name;
  document.getElementById("currentUserText").innerText = name;
  document.querySelectorAll("button").forEach(b=>{b.classList.remove("active"); if(b.innerText===name) b.classList.add("active");});
}

// 任务
function addTask(){
  let t = document.getElementById("newTask").value.trim();
  let s = parseInt(document.getElementById("newScore").value);
  if(!t || !s) return alert("请输入任务");
  tasks.push([t,s]); saveAll(); renderTasks();
}
function renderTasks(){
  tasksDiv.innerHTML="";
  tasks.forEach((t,index)=>{
    let row = document.createElement("div");
    row.className="task-row";
    let btn = document.createElement("button");
    btn.className="task-button";
    btn.innerText = t[0] + " +" + t[1];
    btn.onclick = ()=>{ addRecord(t[0], t[1]); };
    let editBtn = document.createElement("button");
    editBtn.innerText = "✏️";
    editBtn.style.fontSize="14px"; editBtn.style.padding="4px 6px";
    editBtn.onclick = ()=>{
      let newScore = prompt(`修改【${t[0]}】分数:`, t[1]);
      if(newScore!==null){ let s=parseInt(newScore); if(!isNaN(s)){tasks[index][1]=s; saveAll(); renderTasks(); updateAll(); } }
    };
    let delBtn = document.createElement("button");
    delBtn.innerText = "🗑️";
    delBtn.style.fontSize="14px"; delBtn.style.padding="4px 6px";
    delBtn.onclick = ()=>{ if(confirm(`确定删除任务【${t[0]}】吗？`)){ tasks.splice(index,1); saveAll(); renderTasks(); updateAll(); } };
    row.appendChild(btn); row.appendChild(editBtn); row.appendChild(delBtn);
    tasksDiv.appendChild(row);
  });
}

// 记录
function addRecord(task,score){
  if(!currentUser) return alert("请先选人");
  records.push({name:currentUser, task, score, time:new Date().toISOString(), month:currentMonth});
  saveAll(); updateAll();
  scoreBoard.style.animation = "scoreJump 0.5s"; setTimeout(()=>{scoreBoard.style.animation="";},500);
}
function delRecord(i){ records.splice(i,1); saveAll(); updateAll(); }
function calcScores(month){ let scores={}; records.forEach(r=>{ if(r.month!==month) return; scores[r.name]=(scores[r.name]||0)+r.score; }); return scores; }

function renderRecords(){
  recordsDiv.innerHTML="";
  let visibleRecords = records.slice(-displayCount).reverse();
  visibleRecords.forEach((r,i)=>{
    const div = document.createElement("div");
    div.className="record-item";
    div.innerHTML = `<span>${r.name} ${r.task} +${r.score}</span><button onclick="delRecord(${records.length-1-i})">✕</button>`;
    recordsDiv.appendChild(div);
  });
  showMoreBtn.style.display = records.length > displayCount ? "block" : "none";
}
function showMoreRecords(){ displayCount += 10; renderRecords(); }

function renderScoreBoard(){
  let scores = calcScores(currentMonth);
  const aScore = scores["程大途"]||0;
  const bScore = scores["辛月"]||0;
  let aCrown = aScore > bScore ? " 👑" : "";
  let bCrown = bScore > aScore ? " 👑" : "";
  scoreBoard.innerText = `程大途${aCrown} ${aScore}分  vs  辛月${bCrown} ${bScore}分`;
}

function updateAll(){ renderRecords(); renderScoreBoard(); }

async function init(){
  document.getElementById("dateText").innerText=formatDate();
  await loadFromCloud();
  renderTasks();
  updateAll();
}
init();
</script>
</body>
</html>
