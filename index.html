<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>家务积分🧹</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif;
  background: #f2f3f7;
  padding: 18px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}

h2 {
  text-align: center;
}

button {
  border: none;
  border-radius: 14px;
  padding: 10px;
  margin: 10px;
  background: #f0f0f0;
  font-size: 18px;
}

.primary {
  background: #4a90e2;
  color: white;
}

.active {
  background: #4a90e2;
  color: white;
}

.task-grid {
  display: flex;
  flex-wrap: wrap;
}

.task-grid button {
  flex: 1 0 45%;
  font-size: 16px;
}

.score-board {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.status {
  text-align: center;
  font-size: 12px;
  margin-top: 5px;
  opacity: 0.7;
}

.record-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}
</style>
</head>

<body>

<h2>家务积分🧹</h2>

<div class="card">
📅 <span id="dateText"></span><br>
📆 当前月份：<b id="monthText"></b><br>
👤 当前用户：<b id="currentUserText">未选择</b><br>
<div class="status" id="syncStatus">🟡 初始化中...</div>
</div>

<div class="card">
  <button onclick="setUser('程大途')">程大途</button>
  <button onclick="setUser('辛月')">辛月</button>
</div>

  <div class="card">
  <div class="score-board" id="scoreBoard">
    -- : --
  </div>
</div>
  
<div class="card">
  <div id="tasks" class="task-grid"></div>
</div>

<div class="card">
  <input id="newTask" placeholder="新任务">
  <input id="newScore" type="number" placeholder="分数">
  <button class="primary" onclick="addTask()">添加任务</button>
</div>

<div class="card">
  <h3>📜 记录</h3>
  <div id="records"></div>
</div>

<div class="card">
  <h3>🏆 本月排行榜</h3>
  <ul id="ranking"></ul>
</div>

<script>

// ===== 云配置 =====
const BIN_ID = "69ba0b55c3097a1dd535429c";
const API_KEY = "$2a$10$6pBPrU9SDFjVuN0RpIVh5..BJJOobImUPggq1ftD62HC10eoPjK0a";
const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ===== DOM =====
const tasksDiv = document.getElementById("tasks");
const recordsDiv = document.getElementById("records");
const rankingDiv = document.getElementById("ranking");
const syncStatus = document.getElementById("syncStatus");

// ===== 工具 =====
function formatDate(){
  const d = new Date();
  const days = ["日","一","二","三","四","五","六"];
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} 星期${days[d.getDay()]}`;
}

function setStatus(text){
  syncStatus.innerText = text;
}

// ===== 数据 =====
let currentUser = "";
let now = new Date();
let currentMonth = now.toISOString().slice(0,7);

let tasks = JSON.parse(localStorage.getItem("tasks")||`[
["倒垃圾",1],["洗碗",1],["做饭",3],["拖地",2]
]`);

let records = JSON.parse(localStorage.getItem("records")||`[]`);
let rewardGiven = JSON.parse(localStorage.getItem("reward")||`{}`);
let lastSettlement = localStorage.getItem("lastSettlement") || "";

// ===== 云同步 =====
let lastSyncTime = 0;

async function syncToCloud(){
  let nowTime = Date.now();
  if(nowTime - lastSyncTime < 1000) return;

  lastSyncTime = nowTime;
  setStatus("🟡 同步中...");

  try{
    await fetch(BASE_URL, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY
      },
      body: JSON.stringify({tasks, records})
    });

    setStatus("🟢 已同步");

  }catch(e){
    console.log(e);
    setStatus("🔴 同步失败");
  }
}

async function loadFromCloud(){
  setStatus("🟡 加载云数据...");

  try{
    let res = await fetch(BASE_URL, {
      headers: {"X-Master-Key": API_KEY}
    });

    let data = await res.json();

    if(data.record){
      tasks = data.record.tasks || tasks;
      records = data.record.records || records;
    }

    setStatus("🟢 云数据已加载");

    renderTasks();
    updateAll();

  }catch(e){
    console.log(e);
    setStatus("🔴 云加载失败（使用本地数据）");
  }
}

// ===== 保存 =====
function saveAll(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
  localStorage.setItem("records", JSON.stringify(records));
  localStorage.setItem("reward", JSON.stringify(rewardGiven));
  localStorage.setItem("lastSettlement", lastSettlement);

  syncToCloud();
}

// ===== 用户 =====
function setUser(name){
  currentUser = name;
  document.getElementById("currentUserText").innerText = name;

  document.querySelectorAll("button").forEach(b=>{
    b.classList.remove("active");
    if(b.innerText===name) b.classList.add("active");
  });
}

// ===== 任务 =====
function addTask(){
  let t = document.getElementById("newTask").value.trim();
  let s = parseInt(document.getElementById("newScore").value);

  if(!t || !s) return alert("请输入任务");

  tasks.push([t,s]);
  saveAll();
  renderTasks();
}

// ===== 渲染任务 =====
function renderTasks(){
  tasksDiv.innerHTML="";

  tasks.forEach(t=>{
    let b=document.createElement("button");
    b.innerText=t[0]+" +"+t[1];

    b.addEventListener("click", function(){
      addRecord(t[0], t[1]);
    });

    tasksDiv.appendChild(b);
  });
}

// ===== 记录 =====
function addRecord(task,score){
  if(!currentUser) return alert("请先选人");

  records.push({
    name:currentUser,
    task,
    score,
    time:new Date().toISOString(),
    month:currentMonth
  });

  saveAll();
  updateAll();
}

function delRecord(i){
  records.splice(i,1);
  saveAll();
  updateAll();
}

// ===== 分数 =====
function calcScores(month){
  let scores={};
  records.forEach(r=>{
    if(r.month!==month) return;
    scores[r.name]=(scores[r.name]||0)+r.score;
  });
  return scores;
}

// ===== 奖励 =====
function checkReward(scores){
  Object.entries(scores).forEach(([name,score])=>{
    if(score>=100 && !rewardGiven[name]){
      alert(name+" 获得礼物 🎁");
      rewardGiven[name]=true;
    }
  });
}

// ===== 月结算 =====
function monthlySettlement(){
  if(now.getDate()!==1) return;
  if(lastSettlement===currentMonth) return;

  let lastMonthDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
  let lastMonth = lastMonthDate.toISOString().slice(0,7);

  let lastScores = calcScores(lastMonth);

  let diff = (lastScores["程大途"]||0) - (lastScores["辛月"]||0);
  let carry = Math.round(diff/2);

  if(carry!==0){
    records.push({
      name:"系统",
      task:"上月结转",
      score:carry,
      time:new Date().toISOString(),
      month:currentMonth
    });
  }

  rewardGiven={};
  lastSettlement=currentMonth;

  saveAll();
}

// ===== UI =====
function renderRecords(){
  const recordsDiv = document.getElementById("records");
  recordsDiv.innerHTML="";

  records.slice().reverse().forEach((r,i)=>{
    let div=document.createElement("div");
    div.className="record-item";

    div.innerHTML = `
      <span>${r.name} ${r.task} +${r.score}</span>
      <button onclick="delRecord(${records.length-1-i})">✕</button>
    `;

    recordsDiv.appendChild(div);
  });
}
  
function renderScoreBoard(){
  let scores = calcScores(currentMonth);

  let a = scores["程大途"] || 0;
  let b = scores["辛月"] || 0;

  document.getElementById("scoreBoard").innerText =
    `程大途 ${a}分  vs  辛月 ${b}分`;
}
  
function renderRanking(){
  let scores = calcScores(currentMonth);
  checkReward(scores);

  rankingDiv.innerHTML="";

  Object.entries(scores)
  .sort((a,b)=>b[1]-a[1])
  .forEach(([name,score])=>{
    let li=document.createElement("li");
    li.innerHTML=`<b>${name}</b>：${score} 分`;
    rankingDiv.appendChild(li);
  });
}

function updateAll(){
  renderRecords();
  renderRanking();
  renderScoreBoard(); // ⭐ 新增
}

// ===== 初始化 =====
async function init(){
  document.getElementById("dateText").innerText = formatDate();
  document.getElementById("monthText").innerText = currentMonth;

  await loadFromCloud();
  monthlySettlement();

  renderTasks();
  updateAll();
}

init();

</script>

</body>
</html>
